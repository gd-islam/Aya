<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Aya 💖</title>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(to top, #ff9a9e, #fad0c4);
        font-family: "Comic Sans MS", cursive;
        text-align: center;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 400px;
      }

      h1 {
        font-size: 6dvw;
        margin-bottom: 10px;
        animation: fadeIn 2s ease-in-out;

      }

      p {
        font-size: 1em;
        animation: fadeIn 3s ease-in-out;

      }
       @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

      .hint {
        font-size: 0.9em;
        opacity: 0.8;
        margin-top: 10px;
      }

      .heart {
        position: absolute;
        width: 15px;
        height: 15px;
        background: red;
        transform: rotate(45deg);
        animation: float 6s linear infinite;
      }

      .heart::before,
      .heart::after {
        content: "";
        position: absolute;
        width: 15px;
        height: 15px;
        background: red;
        border-radius: 50%;
      }

      .heart::before {
        top: -7px;
      }
      .heart::after {
        left: -7px;
      }

      @keyframes float {
        0% {
          transform: translateY(100vh) rotate(45deg);
          opacity: 1;
        }
        100% {
          transform: translateY(-10vh) rotate(45deg);
          opacity: 0;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🎂 Happy Birthday Aya 💖</h1>
      <p>You make the world cuter just by being in it 💕</p>
      <div class="hint">(tap anywhere 💖)</div>
    </div>

    <!-- Birthday Music -->
    <audio id="music" autoplay loop>
      <source
        src="the_mountain-happy-birthday-508020.mp3"
        type="audio/mpeg"
      />
    </audio>

    <script>
      const music = document.getElementById("music");

      // Try autoplay
      window.addEventListener("load", () => {
        music.play().catch(() => {
          console.log("Autoplay blocked");
        });
      });

      // Play on first tap anywhere (mobile fix)
      document.addEventListener(
        "click",
        () => {
          music.play();
        },
        { once: true },
      );

      function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.animationDuration = 3 + Math.random() * 3 + "s";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
      }

      setInterval(createHeart, 300);
    </script>
  </body>
</html>
